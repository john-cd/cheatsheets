
## References:
## https://www.mkdocs.org/
## https://squidfunk.github.io/mkdocs-material/

# Project information
site_name: "John's Cheatsheets"
site_description: "A collection of cheatsheets and code snippets."
site_author: "S. John CD"
site_url: "https://john-cd.com/cheatsheets/"

# Required within Dev Container (default binding is 127.0.0.1:8000)
dev_addr: 0.0.0.0:8000

## Navigation is automatic but can be overridden:
nav:
  - Home: index.md
  - Big Data:
    - Spark APIs: Big_Data/Spark_APIs.md
  - Containers:
    - Helm Chart Creation: Containers/Helm_Chart_Creation.md
    - Kubernetes Cheatsheet: Containers/Kubernetes_Cheatsheet.md
    - Kubernetes Concepts: Containers/Kubernetes_Concepts.md
    - Kubernetes Examples: Containers/Kubernetes_Examples.md
    - Minikube Install in Ubuntu on Windows: Containers/Minikube_Install_in_Ubuntu_on_Windows.md
    - Minikube Install on Windows: Containers/Minikube_Install_on_Windows.md
  - Data Science:
    - Data Manipulation: Data_Science/Data_Manipulation.md
    - Data Visualization: Data_Science/Data_Visualization.md
    - Deep Learning: Data_Science/Deep_Learning.md
    - Dimensionality Reduction: Data_Science/Dimensionality_Reduction.md
    - Keras: Data_Science/Keras.md
    - Machine Learning: Data_Science/Machine_Learning.md
    - Recommenders: Data_Science/Recommenders.md
    - Scikit-Learn: Data_Science/scikit-learn.md
  - Scala:
    - Scala Generalities: Scala/Scala_Generalities.md
    - Scaladoc: Scala/Scaladoc.md
  - Search:
    - ElasticSearch: Search/ElasticSearch.md
    - Logstash: Search/Logstash.md

## Strict validation, if required:
# validation:
#   omitted_files: warn
#   absolute_links: warn
#   unrecognized_links: warn

# Repository
repo_name: "john-cd/cheatsheets"
repo_url: "https://github.com/john-cd/cheatsheets"
# automatic: edit_uri: edit/master/docs/

# Copyright
copyright: >
  Copyright &copy; 2016 - 2024  S. John CD –
  <a href="#__consent">Change cookie settings</a>

theme:
  name: material

  language: en

  #logo: assets/logo.png
  #favicon: images/favicon.png

  icon:
    repo: fontawesome/brands/github

  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  ## Optional color override
  #   primary: deep orange
  #   accent: orange
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    # alternative: - navigation.tabs
    - navigation.sections
    - navigation.prune
    - navigation.indexes
    - navigation.footer
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide

# Options
extra:
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/john-cd"
    - icon: fontawesome/brands/twitter
      link: "https://twitter.com/sjncd"
    - icon: fontawesome/brands/linkedin
      link: "https://www.linkedin.com/in/scdupeyrat/"
  #  disqus: 'your-shortname'

  # Google Analytics
  analytics:
    provider: google
    property: G-VH46N7PJC6

    # feedback:
    #   title: Was this page helpful?
    #   ratings:
    #     - icon: material/emoticon-happy-outline
